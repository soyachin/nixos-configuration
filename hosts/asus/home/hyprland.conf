# ================================================================
# hyprland.conf — migrado desde Niri
# ================================================================

################
## MONITORES  ##
################
monitor = eDP-1,    1920x1080@144, 0x0,    1
monitor = HDMI-A-1, 1920x1080@60,  1920x0, 1

################
## AUTOSTART  ##
################
exec-once = swaybg --image /home/hojas/Pictures/Waterhouse_Echo_and_Narcissus_wall.jpg
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland GTK_THEME=Gruvbox-Dark
exec-once = noctalia-shell > /tmp/noctalia.log 2>&1

################
## ENTORNO    ##
################
env = XCURSOR_THEME, macOS
env = XCURSOR_SIZE, 24

################
## INPUT      ##
################
input {
    kb_layout = latam
    numlock_by_default = true
    follow_mouse = 1

    touchpad {
        tap-to-click = true
        disable_while_typing = true
        natural_scroll = false
    }

    sensitivity = 0
}

################
## GENERAL    ##
################
general {
    gaps_in  = 1
    gaps_out = 3
    border_size = 2
    col.active_border   = rgba(98971aff)
    col.inactive_border = rgba(3C3C51ff)
    layout = dwindle
    resize_on_border = true
}

################
## DECORACION ##
################
decoration {
    rounding = 10

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

################
## ANIMACIONES##
################
animations {
    enabled = true
}

################
## LAYOUTS    ##
################
dwindle {
    pseudotile     = true
    preserve_split = true
}

################
## MISC       ##
################
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    focus_on_activate        = true
}

################
## REGLAS     ##
################
# Firefox PiP flotante
windowrulev2 = float,       class:^(firefox)$, title:^(Picture-in-Picture)$

# Bloquear captura de pantalla
windowrulev2 = noscreenshare, class:^(org\.keepassxc\.KeePassXC)$
windowrulev2 = noscreenshare, class:^(org\.gnome\.World\.Secrets)$

# Gamescope fullscreen
windowrulev2 = fullscreen, title:^(gamescope)$

################
## KEYBINDS  ##
################
$mod = SUPER

# ── Apps ────────────────────────────────────────────────────────
bind = $mod,     T,     exec, kitty
bind = $mod,     D,     exec, rofi -show drun
bind = $mod ALT, L,     exec, swaylock
bind = $mod ALT, F,     exec, auto-f-skip
bind = $mod,     Space, exec, tmux-session-picker

# ── Noctalia ────────────────────────────────────────────────────
bind = $mod ALT,  comma, exec, noctalia-shell ipc call settings toggle
bind = $mod,      P,     exec, noctalia-shell ipc call bar toggle
bind = $mod SHIFT, R,    exec, killall noctalia-shell; noctalia-shell > /tmp/noctalia.log 2>&1

# ── Power menu ──────────────────────────────────────────────────
bind = $mod, S, exec, echo -e '󰍃 Logout\n󰜉 Reboot\n󰐥 Shutdown' | rofi -dmenu -p 'Power' \
  -theme-str 'window {width: 10em; height: 15%;} listview {lines: 3;} inputbar { enabled: false; }' \
  | xargs -I{} sh -c 'case "{}" in *Logout*) hyprctl dispatch exit ;; *Reboot*) systemctl reboot ;; *Shutdown*) systemctl poweroff ;; esac'

# ── Audio ───────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, noctalia-shell ipc call volume increase
bindel = , XF86AudioLowerVolume, exec, noctalia-shell ipc call volume decrease
bindl  = , XF86AudioMute,        exec, noctalia-shell ipc call volume muteOutput
bindl  = , XF86AudioMicMute,     exec, noctalia-shell ipc call volume muteInput

# ── Brillo ──────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, noctalia-shell ipc call brightness increase
bindel = , XF86MonBrightnessDown, exec, noctalia-shell ipc call brightness decrease

# ── Ventanas ────────────────────────────────────────────────────
bind = $mod,       Q, killactive
bind = $mod,       V, togglefloating
bind = $mod,       F, fullscreen,   1   # maximizar (sin fullscreen real)
bind = $mod SHIFT, F, fullscreen,   0   # fullscreen real
bind = $mod,       C, centerwindow
bind = $mod SHIFT, P, dpms,         off

# ── Foco ────────────────────────────────────────────────────────
bind = $mod, H,     movefocus, l
bind = $mod, J,     movefocus, d
bind = $mod, K,     movefocus, u
bind = $mod, L,     movefocus, r
bind = $mod, left,  movefocus, l
bind = $mod, down,  movefocus, d
bind = $mod, up,    movefocus, u
bind = $mod, right, movefocus, r

# ── Mover ventanas ──────────────────────────────────────────────
bind = $mod CTRL, H,     movewindow, l
bind = $mod CTRL, J,     movewindow, d
bind = $mod CTRL, K,     movewindow, u
bind = $mod CTRL, L,     movewindow, r
bind = $mod CTRL, left,  movewindow, l
bind = $mod CTRL, down,  movewindow, d
bind = $mod CTRL, up,    movewindow, u
bind = $mod CTRL, right, movewindow, r

# ── Foco entre monitores ────────────────────────────────────────
bind = $mod SHIFT, H,     focusmonitor, l
bind = $mod SHIFT, J,     focusmonitor, d
bind = $mod SHIFT, K,     focusmonitor, u
bind = $mod SHIFT, L,     focusmonitor, r
bind = $mod SHIFT, left,  focusmonitor, l
bind = $mod SHIFT, down,  focusmonitor, d
bind = $mod SHIFT, up,    focusmonitor, u
bind = $mod SHIFT, right, focusmonitor, r

# ── Mover ventana a otro monitor ────────────────────────────────
bind = $mod SHIFT CTRL, H,     movewindow, mon:l
bind = $mod SHIFT CTRL, J,     movewindow, mon:d
bind = $mod SHIFT CTRL, K,     movewindow, mon:u
bind = $mod SHIFT CTRL, L,     movewindow, mon:r
bind = $mod SHIFT CTRL, left,  movewindow, mon:l
bind = $mod SHIFT CTRL, down,  movewindow, mon:d
bind = $mod SHIFT CTRL, up,    movewindow, mon:u
bind = $mod SHIFT CTRL, right, movewindow, mon:r

# ── Workspaces ──────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod CTRL, 1, movetoworkspace, 1
bind = $mod CTRL, 2, movetoworkspace, 2
bind = $mod CTRL, 3, movetoworkspace, 3
bind = $mod CTRL, 4, movetoworkspace, 4
bind = $mod CTRL, 5, movetoworkspace, 5
bind = $mod CTRL, 6, movetoworkspace, 6
bind = $mod CTRL, 7, movetoworkspace, 7
bind = $mod CTRL, 8, movetoworkspace, 8
bind = $mod CTRL, 9, movetoworkspace, 9

# ── Navegación relativa de workspaces ───────────────────────────
bind = $mod,      Page_Down, workspace,      e+1
bind = $mod,      Page_Up,   workspace,      e-1
bind = $mod,      I,         workspace,      e+1
bind = $mod,      U,         workspace,      e-1

bind = $mod CTRL, Page_Down, movetoworkspace, e+1
bind = $mod CTRL, Page_Up,   movetoworkspace, e-1
bind = $mod CTRL, U,         movetoworkspace, e+1
bind = $mod CTRL, I,         movetoworkspace, e-1

# Scroll con rueda del mouse
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Resize (submap — entra con $mod+R, sale con Esc/Enter) ─────
bind = $mod, R, submap, resize
submap = resize
binde = , H,      resizeactive, -20 0
binde = , L,      resizeactive,  20 0
binde = , K,      resizeactive,  0 -20
binde = , J,      resizeactive,  0  20
binde = , left,   resizeactive, -20 0
binde = , right,  resizeactive,  20 0
binde = , up,     resizeactive,  0 -20
binde = , down,   resizeactive,  0  20
bind  = , Escape, submap, reset
bind  = , Return, submap, reset
submap = reset

# KP_Add/Subtract para resize (fuera del submap)
binde = $mod,       KP_Add,      resizeactive,  100 0
binde = $mod,       KP_Subtract, resizeactive, -100 0
binde = $mod SHIFT, KP_Add,      resizeactive,  0 -100
binde = $mod SHIFT, KP_Subtract, resizeactive,  0  100

# ── Grupos (equivalente aproximado a columnas tabuladas) ─────────
bind = $mod,       W,   togglegroup
bind = $mod,       Tab, changegroupactive, f
bind = $mod SHIFT, Tab, changegroupactive, b

# ── Screenshots ──────────────────────────────────────────────────
bind = ,     Print, exec, grimblast copy area
bind = CTRL, Print, exec, grimblast copy screen
bind = ALT,  Print, exec, grimblast copy active

# ── Sesión ───────────────────────────────────────────────────────
bind = $mod SHIFT, E,      exit
bind = CTRL ALT,   Delete, exit
